<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">

  <title>PHP Tree Visualizer — Trace</title>
  <link rel="stylesheet" href="/viz/assets/styles.css">
</head>
<body class="trace-page">

  <header class="trace-header">
    <nav aria-label="Breadcrumb" class="breadcrumb">
      <a class="breadcrumb__back" href="/viz/index.html">
        <svg class="icon" aria-hidden="true">
          <use href="/viz/assets/icons.svg#icon-arrow-left"/>
        </svg>
        Traces
      </a>
      <span class="breadcrumb__sep" aria-hidden="true">/</span>
      <h1 id="trace-uri" class="breadcrumb__uri h1" title=""></h1>

      <div class="breadcrumb__key">
        <span class="micro breadcrumb__key-label">KEY:</span>
        <span id="trace-key-short" class="code"></span>
        <button id="copy-key" type="button" class="icon-button"
                aria-label="Copy full trace key">
          <svg class="icon" aria-hidden="true">
            <use href="/viz/assets/icons.svg#icon-copy"/>
          </svg>
        </button>
        <span id="copy-tooltip" class="copy-tooltip" hidden role="status"
              aria-live="polite">Copied</span>
      </div>
    </nav>

    <div id="metadata-strip" class="metadata-strip"></div>

    <div id="banner-zone" class="banner-zone"></div>
  </header>

  <main class="trace-body">
    <div id="error-banner" class="banner banner--danger" hidden></div>

    <div id="tree-wrapper" class="tree-wrapper">

      <div class="tree-search" role="search">
        <div class="tree-search__input-wrap">
          <svg class="icon tree-search__icon" aria-hidden="true">
            <use href="/viz/assets/icons.svg#icon-search"/>
          </svg>
          <input
            id="tree-search-input"
            type="search"
            class="tree-search__input"
            placeholder="Find in tree"
            aria-label="Find in tree"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="tree-search-clear" type="button"
                  class="icon-button tree-search__clear"
                  aria-label="Clear search" hidden>
            <svg class="icon" aria-hidden="true">
              <use href="/viz/assets/icons.svg#icon-x"/>
            </svg>
          </button>
        </div>

        <span id="tree-search-count" class="small tree-search__count"
              role="status" aria-live="polite"></span>

        <button id="tree-search-prev" type="button"
                class="icon-button" aria-label="Previous match" disabled>
          <svg class="icon" aria-hidden="true">
            <use href="/viz/assets/icons.svg#icon-chevron-up"/>
          </svg>
        </button>
        <button id="tree-search-next" type="button"
                class="icon-button" aria-label="Next match" disabled>
          <svg class="icon" aria-hidden="true">
            <use href="/viz/assets/icons.svg#icon-chevron-down"/>
          </svg>
        </button>

        <div class="sort-dropdown">
          <button id="sort-trigger" type="button"
                  class="button button--text sort-dropdown__trigger"
                  aria-haspopup="menu" aria-expanded="false"
                  title="Sort the call tree by metric">
            Sort by
            <svg class="icon" aria-hidden="true">
              <use href="/viz/assets/icons.svg#icon-chevron-down"/>
            </svg>
          </button>
          <ul id="sort-menu" class="sort-dropdown__menu"
              role="menu" aria-labelledby="sort-trigger" hidden>
            <li role="menuitemradio" data-sort="total_wall_desc"
                aria-checked="true" tabindex="-1">Total (desc)</li>
            <li role="menuitemradio" data-sort="self_wall_desc"
                aria-checked="false" tabindex="-1">Self (desc)</li>
            <li role="menuitemradio" data-sort="count_desc"
                aria-checked="false" tabindex="-1">Count (desc)</li>
            <li role="menuitemradio" data-sort="mem_delta_desc"
                aria-checked="false" tabindex="-1">Mem (desc)</li>
            <li role="menuitemradio" data-sort="fqn_asc"
                aria-checked="false" tabindex="-1">Function (asc)</li>
          </ul>
        </div>
      </div>

      <div class="column-header" role="row">
        <span class="column-header__cell micro" role="columnheader"
              data-col="fqn">Function</span>
        <span class="column-header__cell micro column-header__cell--right"
              role="columnheader" data-col="count">Count</span>
        <span class="column-header__cell micro column-header__cell--right"
              role="columnheader" data-col="total_wall">Total</span>
        <span class="column-header__cell micro column-header__cell--right"
              role="columnheader" data-col="self_wall">Self</span>
        <span class="column-header__cell micro column-header__cell--right"
              role="columnheader" data-col="pct_parent">%Parent</span>
        <span class="column-header__cell micro column-header__cell--right"
              role="columnheader" data-col="mem_delta">Mem</span>
      </div>

      <div id="tree-viewport" class="tree-viewport"
           role="tree" aria-label="Call tree">
        <div id="tree-spacer" class="tree-spacer"></div>
        <ul id="tree-rows" class="tree-rows" role="presentation">
          <!-- Pre-rendered skeleton rows; replaced by detail.js on
               response. Five 28-px blocks per §3.3.9. -->
          <li class="skeleton-tree-row" aria-hidden="true">
            <div class="skeleton-row__block" style="width: 60%"></div>
          </li>
          <li class="skeleton-tree-row" aria-hidden="true">
            <div class="skeleton-row__block" style="width: 45%"></div>
          </li>
          <li class="skeleton-tree-row" aria-hidden="true">
            <div class="skeleton-row__block" style="width: 70%"></div>
          </li>
          <li class="skeleton-tree-row" aria-hidden="true">
            <div class="skeleton-row__block" style="width: 50%"></div>
          </li>
          <li class="skeleton-tree-row" aria-hidden="true">
            <div class="skeleton-row__block" style="width: 35%"></div>
          </li>
        </ul>
      </div>

      <!-- Inline empty state. Sibling of tree-viewport; detail.js
           swaps the two (one visible at a time) on client-side key
           validation failure or an API 404. See the
           frontend-trace-detail-core capability's "404 renders the
           Trace not found empty state" requirement. -->
      <div id="tree-empty" class="tree-empty" hidden>
        <p class="tree-empty__title"></p>
        <p class="tree-empty__body"></p>
      </div>
    </div>

    <!-- Copy-fallback modal: hidden by default; shown when the
         clipboard API rejects or is absent. -->
    <div id="copy-modal" class="modal" hidden role="dialog"
         aria-modal="true" aria-labelledby="copy-modal-title">
      <div class="modal__card">
        <h2 id="copy-modal-title" class="h2">Copy trace key</h2>
        <p class="small">Select all and copy with Ctrl/Cmd+C.</p>
        <input id="copy-modal-input" type="text" readonly
               class="login-input copy-modal__input">
        <button id="copy-modal-close" type="button" class="button">OK</button>
      </div>
    </div>
  </main>

  <script type="module" src="/viz/js/detail.js"></script>
</body>
</html>
