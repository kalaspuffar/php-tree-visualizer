# apache-example.conf — illustrative snippet, NOT a drop-in config.
#
# The operator copies the bits below into the existing Apache vhost
# that already fronts PHP-FPM for the dev application. Paths, FPM
# socket, and TLS terminator are environment-specific. Apache 2.4 is
# assumed; the patterns are the same on 2.2 but a few directive names
# differ.
#
# Required modules (enable with `a2enmod` or your distro's equivalent):
#   mod_proxy               # base proxy machinery
#   mod_proxy_fcgi          # talks to PHP-FPM over UDS or TCP
#   mod_proxy_http          # /ingest/v1 → http://127.0.0.1:8088
#   mod_rewrite             # for the /api/* path -> .php mapping
#   mod_headers             # X-Content-Type-Options + Referrer-Policy
#   mod_log_config          # for the custom LogFormat
#
# On Debian: `a2enmod proxy proxy_fcgi proxy_http rewrite headers`
# enables them all. Note that `a2enmod proxy_fcgi` alone does NOT
# pull in `proxy` or `proxy_http` — Apache modules don't auto-resolve
# dependencies the way apt packages do.
#
# After editing the live config, `apache2ctl configtest && systemctl
# reload apache2` (or `httpd -t && systemctl reload httpd` on RHEL).
#
# This file is a vhost FRAGMENT — no <VirtualHost>, no Listen, no
# MPM. Pasted into an existing vhost it works. Run standalone via
# `apache2ctl -f apache-example.conf` and you'll get
# "Configuration error: No MPM loaded." To syntax-check the fragment
# without modifying the operator's live config, use the sibling
# script:
#
#   bash bin/validate-proxy-configs.sh --proxy=apache
#
# (running it with no args validates both apache + nginx in one go).
# The script substitutes the repo root into etc/apache-validate.conf.in
# and runs `apache2 -t -f <generated-wrapper>` — the binary directly,
# not the apache2ctl wrapper, so it works without root (apache2ctl's
# unconditional /var/run/apache2 mkdir would fail). The same script
# runs in CI on every PR — see .github/workflows/ci.yml.
#
# Expected output: "Syntax OK" plus a benign "DocumentRoot does not
# exist" warning on hosts where the placeholder path isn't real.
#
# Goals served by this snippet (same as etc/nginx-example.conf):
#   - Redirect / to /viz/login.html so a bare-hostname browse lands
#     on a useful page (not Apache's default placeholder).
#   - Map /api/* to the PHP files in api/.
#   - Map /viz/* to the static frontend directory.
#   - Refuse /api/internal/* — that subtree is internal helpers, never
#     intended to be hit directly by a browser.
#   - Reverse-proxy /ingest/v1 to the collector on 127.0.0.1:8088.
#   - Define a LogFormat that omits Authorization and Cookie so INV-2
#     (no token in logs) holds.
#
# Filesystem layout note: this snippet assumes /var/www/php-tree-viz/
# contains real directories (or copies of api/ and viz/). If you
# instead symlink api/ and viz/ to a development checkout — say
# `ln -s /home/$USER/php-tree-visualizer/api /var/www/php-tree-viz/api` —
# then Apache 2.4 requires `Options +FollowSymLinks` inside the
# relevant `<Directory>` block (it's disabled by default). On a
# default Debian install `/home/$USER` is mode 0700; the symlink
# target's path must be traversable by `www-data` (`chmod o+x
# /home/$USER`, or copy the files outside the home dir).

# ---- Logging hygiene -------------------------------------------------
#
# The default `combined` LogFormat includes %{Referer}i and
# %{User-Agent}i but not Authorization or Cookie — good. The trap is
# operators who customise it for debugging and add %{Authorization}i.
# This format is the explicit safe baseline.

LogFormat "%h - - [%t] \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" phptv_safe
#         ^ NO %{Authorization}i, NO %{Cookie}i, NO request-body capture.

# Apply to whichever CustomLog directive the vhost uses, replacing the
# `combined` or `common` token:
# CustomLog /var/log/apache2/php-tree-viz.access.log phptv_safe

# ---- VirtualHost block (excerpt) ------------------------------------
#
# Insert the directives below into the existing `<VirtualHost ...>`
# block. Adapt `DocumentRoot` and the FPM socket path to local
# conventions.
#
# Path conventions assumed:
#   /var/www/php-tree-viz/api/        (this repo's `api/` directory)
#   /var/www/php-tree-viz/viz/        (Phase 5+: the static frontend)

DocumentRoot "/var/www/php-tree-viz"

# 0) / → /viz/login.html. A bare-hostname browse lands on the login
#    page instead of Apache's default placeholder. `RedirectMatch` is
#    used (not `Redirect`) so only the exact root path matches; a
#    `Redirect / /viz/login.html` would also match /api/auth and other
#    paths and break the API.
RedirectMatch ^/$ /viz/login.html

# 1) /api/internal/* — never served. Internal helpers, not endpoints.
<LocationMatch "^/api/internal/">
    Require all denied
    # Belt: even if a misconfigured Alias exposes the filesystem path,
    # this <LocationMatch> rejects the URL space.
</LocationMatch>

# 2) Defence in depth: forbid filesystem access to api/internal/ too.
<Directory "/var/www/php-tree-viz/api/internal">
    Require all denied
</Directory>

# 3) Path -> .php rewrites.
#    Apache won't auto-resolve /api/auth to /api/auth.php; we rewrite
#    explicitly and keep everything else inside /api/ off the .php
#    extension so stray files (uploads, test scripts) can never be
#    executed by accident.
<Directory "/var/www/php-tree-viz/api">
    Options -Indexes -ExecCGI
    AllowOverride None
    Require all granted

    RewriteEngine On

    # Exact-match routes — keep these explicit so a typo in a path
    # doesn't silently fall through to a different handler.
    RewriteRule  "^auth$"           "auth.php"     [L]
    RewriteRule  "^auth/logout$"    "auth.php"     [L]
    RewriteRule  "^traces$"         "traces.php"   [L]

    # /api/traces/<key>, /api/traces/<key>/tree, /tree/<id>/children
    # — Phase 4. Listed here so the operator only edits the vhost
    # once. The trace.php file does NOT exist yet; until Phase 4
    # lands, requests under /api/traces/ will 404 from the rewrite
    # target.
    RewriteRule  "^traces/.*$"      "trace.php"    [L]

    # Anything else under /api/ that isn't one of the rewrites above
    # (e.g. /api/foo, /api/auth/typo) → 404. This prevents the FPM
    # handler below from being asked to run a non-existent script.
    RewriteCond  "%{REQUEST_FILENAME}"  "!-f"
    RewriteRule  "."                "-"            [R=404,L]
</Directory>

# 4) Hand off any *.php in /api/ to PHP-FPM. The path is hardcoded to
#    the directory so .php files anywhere else on disk are not
#    accidentally executed via this handler.
<FilesMatch "\.php$">
    SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost/"
</FilesMatch>

# CRITICAL: configure /etc/php/8.4/fpm/pool.d/*.conf so the FPM pool's
# `access.format` does NOT include %{HTTP_AUTHORIZATION}o. FPM's
# access log is independent of Apache's — INV-2 only holds if BOTH are
# stripped.

# 5) /viz/* — static frontend.
Alias /viz/ "/var/www/php-tree-viz/viz/"
<Directory "/var/www/php-tree-viz/viz">
    Options -Indexes
    AllowOverride None
    Require all granted

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"

    # CSP is intentionally minimal here. The full frontend uses inline
    # styles in some places; a strict CSP needs `style-src 'self'
    # 'unsafe-inline'` plus operator-environment decisions about
    # `connect-src`. We leave CSP as an operator exercise — pick a
    # value, keep it short enough to fit on one short line so `vi`
    # paste doesn't wrap it, test with the browser's devtools console.
    # Example (one short line):
    # Header always set Content-Security-Policy "default-src 'self'"
</Directory>

# 6) /ingest/v1 — reverse-proxy to the collector on its loopback port.
#    The collector binds 127.0.0.1:8088 by default (loopback-only per
#    SPECIFICATION.md §3.4 / NF-4.4; the reverse proxy is the only
#    public-internet path). Apache forwards the verbatim request body
#    and Authorization header.
#
#    ProxyRequests Off disables Apache as a forward-proxy entirely;
#    ProxyPreserveHost Off makes the collector see Host: 127.0.0.1
#    in its logs (the collector doesn't care about the Host value).
ProxyRequests Off
ProxyPreserveHost Off
<Location "/ingest/v1">
    ProxyPass        "http://127.0.0.1:8088/ingest/v1"
    ProxyPassReverse "http://127.0.0.1:8088/ingest/v1"
</Location>

# ---- Reminder for the operator --------------------------------------
#
# - INV-2: no token in any log. After the first real session, confirm:
#       sudo grep -r "$YOUR_CONFIGURED_TOKEN" \
#           /var/log/apache2/ /var/log/php8.4-fpm.log
#   should return zero matches. Run the same check whenever LogFormat
#   or FPM access.format is edited.
#
# - nginx equivalent: same shape, different syntax. See
#   etc/nginx-example.conf in the same directory.
