# nginx-example.conf — illustrative snippet, NOT a drop-in config.
#
# The operator copies the bits below into the existing server block
# that already fronts PHP-FPM for the dev application. Paths, FPM
# socket, and TLS terminator are environment-specific.
#
# Goals served by this snippet:
#   - Map /api/* to the PHP files in api/.
#   - Map /viz/* to the static frontend directory (Phase 5+).
#   - Refuse /api/internal/* — that subtree is internal helpers, never
#     intended to be hit directly by a browser.
#   - Define a log_format that omits the Authorization header and the
#     Cookie header so INV-2 (no token in logs) holds.
#
# After editing the live config, `nginx -t && systemctl reload nginx`.

# ---- Logging hygiene -------------------------------------------------
#
# The default `combined` format includes "$http_referer" and
# "$http_user_agent" but not Authorization or Cookie — good. The trap is
# operators who customise log_format and add `"$http_authorization"` or
# similar for debugging. This format is the explicit safe baseline.

log_format phptv_safe
    '$remote_addr - - [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';
#   ^ NO $http_authorization, NO $http_cookie, NO request body capture.

# Apply to whichever access_log directive the server block uses:
# access_log /var/log/nginx/php-tree-viz.access.log phptv_safe;

# ---- Server block (excerpt) -----------------------------------------
#
# Insert the four `location` blocks below into the existing
# `server { ... }` block. Adapt `$document_root` and the FPM socket
# path to local conventions.

# Path conventions assumed:
#   /var/www/php-tree-viz/api/        (this repo's `api/` directory)
#   /var/www/php-tree-viz/viz/        (Phase 5+: the static frontend)

# 1) /api/internal/* — never served. Internal helpers, not endpoints.
location ^~ /api/internal/ {
    return 404;
}

# 2) /api/auth, /api/auth/logout — handled by auth.php
location = /api/auth        { try_files $uri /api/auth.php; }
location = /api/auth/logout { try_files $uri /api/auth.php; }

# 3) /api/traces (list) — handled by traces.php
location = /api/traces      { try_files $uri /api/traces.php; }

# 4) /api/traces/* (single trace, tree, children) — handled by trace.php
#    (Phase 4. Listed here so the operator only edits the proxy once.)
location ^~ /api/traces/    { try_files $uri /api/trace.php; }

# 5) The PHP backends. All requests with a .php suffix under api/ are
#    served via PHP-FPM. We keep the location restricted so that *.php
#    files anywhere else (e.g. uploaded fixtures or stray test scripts)
#    are NOT executed by accident.
location ~ ^/api/.+\.php$ {
    fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;

    # CRITICAL: do NOT forward the Authorization header into FPM logs.
    # FPM's own access log is separate; configure /etc/php/8.4/fpm/pool.d/*.conf
    # so `access.format` does NOT include %{HTTP_AUTHORIZATION}o.
}

# 6) /viz/* — static frontend (Phase 5+).
location /viz/ {
    alias /var/www/php-tree-viz/viz/;
    try_files $uri $uri/ =404;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin"   always;
    # Content-Security-Policy: see frontend slice for the right value.
}

# ---- Reminder for the operator --------------------------------------
#
# - INV-2: no token in any log. After the first real session, confirm:
#       sudo grep -r "$YOUR_CONFIGURED_TOKEN" /var/log/nginx/ /var/log/php8.4-fpm.log
#   should return zero matches.
#
# - The Rust collector binds on 127.0.0.1:8088 by default; map
#   /ingest/v1 to that backend in the same server block. That route is
#   NOT in this snippet because it belongs to the collector-http
#   capability, not this PHP API slice.
#
# - Apache equivalent: combine a `<Location /api/internal/>Require all
#   denied</Location>` block with a `LogFormat` line that omits
#   Authorization and Cookie. The same shape, different syntax.
