# nginx-example.conf — illustrative snippet, NOT a drop-in config.
#
# The operator copies the bits below into the existing server block
# that already fronts PHP-FPM for the dev application. Paths, FPM
# socket, and TLS terminator are environment-specific.
#
# Required apt package: `nginx-light` is sufficient (the smallest
# variant on Debian 13 that contains every directive used below).
# `nginx-full` works too. No plus-modules are used; every directive
# here is in `nginx-core`. There is no `a2enmod`-equivalent step.
#
# Goals served by this snippet (mirror etc/apache-example.conf):
#   - Redirect / to /viz/login.html so a bare-hostname browse lands
#     on a useful page (not nginx's default placeholder).
#   - Map /api/* to the PHP files in api/.
#   - Map /viz/* to the static frontend directory.
#   - Refuse /api/internal/* — that subtree is internal helpers, never
#     intended to be hit directly by a browser.
#   - Reverse-proxy /ingest/v1 to the collector on 127.0.0.1:8088.
#   - Define a log_format that omits the Authorization header and the
#     Cookie header so INV-2 (no token in logs) holds.
#
# Filesystem layout note: this snippet assumes /var/www/php-tree-viz/
# contains real directories (or copies of api/ and viz/). nginx
# follows symlinks by default — unlike Apache 2.4, there is no
# +FollowSymLinks equivalent to enable. The home-directory traversal
# trap from etc/apache-example.conf still applies though: a default
# Debian install has /home/$USER at mode 0700, so a
# /var/www/<site>/{api,viz} symlink into the user's home dir won't
# traverse for `www-data`. Typical fix: `chmod o+x /home/$USER` to
# widen to 0701 (other users can traverse but not list/read), or
# move the files outside the home dir entirely.
#
# After editing the live config, `nginx -t && systemctl reload nginx`.
#
# To syntax-check this fragment locally before pushing — without
# touching the operator's live config — run the sibling script:
#
#   bash tools/validate-proxy-configs.sh --proxy=nginx
#
# (running it with no args validates both apache + nginx in one go).
# The script substitutes the repo root into etc/nginx-validate.conf.in
# and runs `nginx -t -c <generated-wrapper>`. The same script runs
# in CI on every PR — see .github/workflows/ci.yml.

# ---- Logging hygiene -------------------------------------------------
#
# nginx's default `combined` log_format omits Authorization and Cookie
# — INV-2 holds out of the box. The trap is operators who customise
# log_format and add `"$http_authorization"` for debugging. If you
# want an explicit, tighter format, define it in your main nginx.conf's
# `http {}` block (the `log_format` directive is NOT allowed inside a
# `server {}` block, so it can't live in this snippet — the snippet is
# itself wrapped into a server block by `etc/install-debian.sh` or by
# the operator). The default works fine for INV-2; the comment is here
# so future readers don't try to add `$http_authorization` and break
# the invariant by accident.
#
# Recommended access_log line (place inside the server block):
# access_log /var/log/nginx/php-tree-viz.access.log;

# ---- Server block (excerpt) -----------------------------------------
#
# Insert the four `location` blocks below into the existing
# `server { ... }` block. Adapt `$document_root` and the FPM socket
# path to local conventions.

# Path conventions assumed:
#   /var/www/php-tree-viz/api/        (this repo's `api/` directory)
#   /var/www/php-tree-viz/viz/        (Phase 5+: the static frontend)

# 0) / → /viz/login.html. Bare-hostname browse lands on the login
#    page instead of nginx's default placeholder. The `=` exact-
#    match prefix matches ONLY the root path; /api/foo and /viz/bar
#    are unaffected.
location = / {
    return 302 /viz/login.html;
}

# 1) /api/internal/* — never served. Internal helpers, not endpoints.
location ^~ /api/internal/ {
    return 404;
}

# 2) /api/auth, /api/auth/logout — handled by auth.php
location = /api/auth        { try_files $uri /api/auth.php; }
location = /api/auth/logout { try_files $uri /api/auth.php; }

# 3) /api/traces (list) — handled by traces.php
location = /api/traces      { try_files $uri /api/traces.php; }

# 4) /api/traces/* (single trace, tree, children) — handled by trace.php
#    (Phase 4. Listed here so the operator only edits the proxy once.)
location ^~ /api/traces/    { try_files $uri /api/trace.php; }

# 5) The PHP backends. All requests with a .php suffix under api/ are
#    served via PHP-FPM. We keep the location restricted so that *.php
#    files anywhere else (e.g. uploaded fixtures or stray test scripts)
#    are NOT executed by accident.
location ~ ^/api/.+\.php$ {
    fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;

    # CRITICAL: do NOT forward the Authorization header into FPM logs.
    # FPM's own access log is separate; configure /etc/php/8.4/fpm/pool.d/*.conf
    # so `access.format` does NOT include %{HTTP_AUTHORIZATION}o.
}

# 6) /viz/* — static frontend.
location /viz/ {
    alias /var/www/php-tree-viz/viz/;
    try_files $uri $uri/ =404;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin"   always;

    # CSP is intentionally minimal here. The full frontend uses inline
    # styles in some places; a strict CSP needs additional directives
    # plus operator-environment decisions. We leave CSP as an operator
    # exercise — pick a value short enough to fit on one short line so
    # `vi` paste doesn't wrap it. Example (one short line):
    # add_header Content-Security-Policy "default-src 'self'" always;
}

# 7) /ingest/v1 — reverse-proxy to the collector on its loopback port.
#    The collector binds 127.0.0.1:8088 by default (loopback-only per
#    SPECIFICATION.md §3.4 / NF-4.4; the reverse proxy is the only
#    public-internet path). `location = /ingest/v1` is exact-match —
#    requests to /ingest/v1/foo are NOT proxied (the collector has no
#    sub-paths under /ingest/v1).
#
#    proxy_request_buffering off matches SPECIFICATION.md §3.4's
#    table guidance: stream the request body straight through. The
#    collector parses MessagePack frame-by-frame and writes to a
#    tmp file as bytes arrive; buffering at the proxy would defeat
#    that.
location = /ingest/v1 {
    proxy_pass http://127.0.0.1:8088/ingest/v1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
}

# ---- Reminder for the operator --------------------------------------
#
# - INV-2: no token in any log. After the first real session, confirm:
#       sudo grep -r "$YOUR_CONFIGURED_TOKEN" /var/log/nginx/ /var/log/php8.4-fpm.log
#   should return zero matches.
#
# - Apache equivalent: combine a `<Location /api/internal/>Require all
#   denied</Location>` block with a `LogFormat` line that omits
#   Authorization and Cookie. The same shape, different syntax. See
#   etc/apache-example.conf in the same directory.
