name: CI

# Four parallel jobs gate every PR and every push to `main`:
#
#   rust:          cargo fmt --all -- --check
#                  cargo clippy --all-targets --all-features -- -D warnings
#                  cargo test  --all-targets --all-features
#
#   php:           php tests/api/run.php
#                  (the API test harness — unit + integration, ~600
#                  assertions across Phases 3 + 4)
#
#   frontend:      node tests/frontend/run.js
#                  (Node-based unit tests for the framework-free JS
#                  modules under viz/js/)
#
#   proxy-configs: bash tools/validate-proxy-configs.sh
#                  (apache2ctl -t and nginx -t against the example
#                  fragments under etc/, via the .in wrappers)
#
# All four already run locally before every commit (the proxy
# configtests via the tools/ script); CI is the safety net for
# "I forgot to run the suite" days.
#
# The Rust toolchain is pinned via `rust-toolchain.toml`. The PHP
# and Node versions are pinned here in the workflow (PHP aligned
# with the operator's dev host per SPECIFICATION.md §7.1; Node at
# the current LTS line). The proxy-configs job uses whatever
# `apache2` and `nginx-light` Ubuntu's apt ships on the runner.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Cancel in-flight runs for the same ref when a new commit arrives.
# Saves CI minutes on rapid-fire pushes; doesn't affect main pushes
# (each main commit gets its own non-cancelled run via the unique
# group key).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    # Display name unchanged from the pre-PHP era so any branch
    # protection rule that requires this status check by name still
    # matches. The new PHP job below is additive.
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # `rust-toolchain.toml` pins the channel and the rustfmt +
        # clippy components. `rustup show` resolves the file and
        # installs whatever's missing.
        run: rustup show

      - name: Cache cargo
        # Caches ~/.cargo registry + git db + target/. Keyed on
        # Cargo.lock so a dependency bump cleanly invalidates.
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --all-features

  php:
    name: php — api tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        # 8.4 matches the operator's dev host; pdo_sqlite + sqlite3
        # are required per SPECIFICATION.md §7.1 / D-3. The action
        # caches PHP + extensions so warm runs are sub-30 s.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3
          coverage: none
          tools: none

      - name: Confirm pdo_sqlite is loaded
        # Fail fast with a clear message if the extension didn't
        # install, rather than letting the first PDO open throw a
        # cryptic "Driver not found" mid-test. The value is quoted
        # because the inline `?:` would otherwise look like a YAML
        # mapping to the parser.
        run: 'php -r "exit(extension_loaded(''pdo_sqlite'') ? 0 : 1);"'

      - name: Run the API test suite
        # Discovers tests/api/**/*_test.php, runs each in a child
        # process, prints pass/fail, exits non-zero on any failure.
        run: php -d error_reporting=E_ALL -d display_errors=stderr tests/api/run.php

  frontend:
    name: frontend — js tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        # Node 22 is the current LTS line; native ES modules + the
        # global `fetch`/`Response` we use in tests.
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run the frontend test suite
        # Discovers tests/frontend/**/*_test.js, runs each in a
        # child Node process, prints pass/fail, exits non-zero on
        # any failure.
        run: node tests/frontend/run.js

  proxy-configs:
    name: proxy — apache + nginx configtest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apache2 + nginx-light
        # Both packages exist in the ubuntu-latest apt repos.
        # --no-install-recommends keeps the install minimal:
        # we only need the binaries (`apache2ctl`, `nginx`)
        # and their core modules for `-t` / `configtest`.
        # nginx-light matches what etc/install-debian.sh
        # installs, keeping CI and the operator install
        # path on the same package.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends apache2 nginx-light

      - name: Validate etc/apache-example.conf and etc/nginx-example.conf
        # The script generates wrappers from the .in templates
        # (substituting __REPO_ROOT__) and runs apache2ctl -t
        # plus nginx -t. Exit non-zero on any failure with the
        # offending tool's stderr re-emitted for the CI log.
        run: bash tools/validate-proxy-configs.sh
